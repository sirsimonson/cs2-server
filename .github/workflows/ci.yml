name: CS2 ARM64 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  shellcheck:
    name: Lint bash scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'


  build-test:
    name: Build docker images
    runs-on: ubuntu-22.04-arm
    needs: shellcheck
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.generic]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Test build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/arm64
          load: true
          tags: cs2-arm64:${{ matrix.dockerfile }}-ci
          cache-from: type=gha,scope=cs2-${{ matrix.dockerfile }}
          cache-to: type=gha,scope=cs2-${{ matrix.dockerfile }},mode=max

      - name: Save image for next job
        run: |
          docker save cs2-arm64:${{ matrix.dockerfile }}-ci -o /tmp/image-${{ matrix.dockerfile }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-${{ matrix.dockerfile }}
          path: /tmp/image-${{ matrix.dockerfile }}.tar
          retention-days: 1

  server-build-test:
    name: Test server startup
    runs-on: ubuntu-22.04-arm
    needs: build-test
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.generic]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-image-${{ matrix.dockerfile }}
          path: /tmp

      - name: Load image into Docker
        run: |
          docker load -i /tmp/image-${{ matrix.dockerfile }}.tar
          docker image ls cs2-arm64

      - name: Run SteamCMD in test mode
        run: |
          docker run \
            --rm \
            -e CI_TEST_MODE=true \
            -e ENABLE_MODDING=false \
            -e ALWAYS_UPDATE_ON_START=false \
            -e STEAM_GAMESERVER_API=00000000000000000000000000000000 \
            cs2-arm64:${{ matrix.dockerfile }}-ci