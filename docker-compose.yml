services:
  cs2-server:
    build:
      context: .
      dockerfile: Dockerfile
      # change to "Dockerfile.generic" if you are not using Oracle Ampere
    container_name: cs2-server

    # Host networking avoids NAT overhead that causes subtick desync
    network_mode: host
    restart: 'unless-stopped'
    ulimits:
      nice:
        soft: -20
        hard: -20
        
    environment:
      - STEAM_GAMESERVER_API=${STEAM_TOKEN:?}
      - STARTUP_MAP=${STARTUP_MAP:-de_dust2}
      - ALWAYS_UPDATE_ON_START=true
      - ENABLE_MODDING=false
      - DOTNET_EnableWriteXorExecute=1
      - CPU_CORE_COUNT=3
      - SERVER_NICENESS=0
      - PUID=1001
      - PGID=1001
      - MMS_URL=
      - CSS_URL=
      - EXTRA_PARAMS=-nojoy -nohltv +engine_no_focus_sleep 0 +fps_max 64 +sv_hibernate_when_empty 0
      
    volumes:
      - cs2-data:/cs2-data
      - fex-data:/home/steam/.fex-emu
    stdin_open: true
    tty: true
    entrypoint: /home/steam/init-server.sh

volumes:
  cs2-data:
  fex-data:
