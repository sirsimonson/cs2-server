services:
  cs2-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cs2-server

    # Ressourcen-Limits direkt in der Compose (Single Source of Truth)
    deploy:
      resources:
        limits:
          cpus: '3.5'
          memory: 20G
    
    # Port-Mapping laut Guide (Outside of Proxy control)
    ports:
      - "27015:27015/udp"
      - "27015:27015/tcp"
      - "27020:27020/udp"
      - "26900:26900/udp"
      - "27005:27005/udp"

    restart: unless-stopped
    ulimits:
      nice:
        soft: -20
        hard: -20
        
    environment:
      STEAM_GAMESERVER_API: ${STEAM_TOKEN:?}
      EXTRA_PARAMS: '${EXTRA_PARAMS:-+mat_queue_mode 2 -nojoy -nohltv +engine_no_focus_sleep 0 +fps_max 64 +sv_max_usercmd_future_ticks 4 +sv_hibernate_when_empty 0 +map de_dust2 +hostname "Müllers Mahlwerk | Wer zuerst schießt, mahlt zuerst"}'
      ALWAYS_UPDATE_ON_START: ${ALWAYS_UPDATE_ON_START:-false}
      INSTALL_MODDING: ${INSTALL_MODDING:-true}
      INSTALL_PLUGIN_PACK: ${INSTALL_PLUGIN_PACK:-true}
      DOTNET_EnableWriteXorExecute: ${DOTNET_EnableWriteXorExecute:-0}
      CPU_CORE_COUNT: ${CPU_CORE_COUNT:?3}
      TZ: Europe/Berlin
      
    volumes:
      - cs2-data:/cs2-data
      - fex-data:/home/steam/.fex-emu
      
    stdin_open: true
    tty: true
    entrypoint: /home/steam/init-server.sh

volumes:
  cs2-data:
  fex-data:
